title: Site

tabs:
  identity:
    label: Naam & navigatie
    sections:
      identity:
        type: fields
        fields:
          siteName:
            type: text
            label: Sitenaam
          notificationActive:
            type: toggle
            label: Mededelingenbalk tonen
            help: Zet de balk boven de website aan of uit.
            default: false
          notificationText:
            type: text
            label: Mededelingentekst
            help: 'Korte tekst, max. ca. 100 tekens. Houd het kort: de balk is maar één regel hoog en moet ook op een telefoonscherm passen.'
            maxlength: 120
            counter: true
          navigation:
            type: structure
            label: Navigatie
            fields:
              label:
                type: text
                label: Label
              href:
                type: text
                label: Link (bijv. #contact)
          navCtaLabel:
            type: text
            label: Knoptekst navigatie (CTA)
            placeholder: Maak een afspraak
          navCtaHref:
            type: text
            label: Knoplink navigatie (CTA)
            placeholder: "#contact"

  contact:
    label: Contact
    sections:
      contact:
        type: fields
        fields:
          contactHeading:
            type: text
            label: Koptekst
          contactIntro:
            type: textarea
            label: Inleidingstekst
          phone:
            type: text
            label: Telefoon
            help: 'Internationaal formaat, bijv. +31612345678. Wordt gebruikt voor bellen, SMS, WhatsApp en Signal.'
          contactBellenActive:
            type: toggle
            label: Bellen tonen
            default: true
          contactSmsActive:
            type: toggle
            label: SMS tonen
            default: true
          contactWhatsappActive:
            type: toggle
            label: WhatsApp tonen
            default: true
          contactSignalActive:
            type: toggle
            label: Signal tonen
            default: true
          email:
            type: text
            label: E-mailadres
          address:
            type: textarea
            label: Praktijkadres
          chamberOfCommerce:
            type: number
            label: Kamer van Koophandel nummer
          VAT:
            type: text
            label: BTW-nummer
          cancellationPolicy:
            type: textarea
            label: Annuleringsbeleid

  pages:
    label: Pagina's
    sections:
      pages:
        type: pages
