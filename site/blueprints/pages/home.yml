title: Homepage

tabs:
  hero:
    label: Hero
    sections:
      hero:
        type: fields
        fields:
          heroTitle:
            type: text
            label: Koptekst
          heroTagline:
            type: text
            label: Ondertitel
          heroCtaLabel:
            type: text
            label: Knoptekst
          heroPortrait:
            type: files
            label: Homepage afbeelding
            max: 1
            query: page.files

  about:
    label: Over Zenmatters
    sections:
      about:
        type: fields
        fields:
          aboutHeading:
            type: text
            label: Koptekst
          aboutBody:
            type: writer
            label: Tekst
            marks:
              - bold
              - italic
          aboutImage:
            type: files
            label: Afbeelding
            max: 1
            query: page.files
          aboutCtaLabel:
            type: text
            label: Knoptekst

  naomi:
    label: Over Naomi
    sections:
      naomi:
        type: fields
        fields:
          naomiHeading:
            type: text
            label: Koptekst
          naomiPortrait:
            type: files
            label: Afbeelding (Verticaal aanbevolen)
            max: 1
            query: page.files
          naomiBody:
            type: writer
            label: Tekst
            marks:
              - bold
              - italic
          naomiCertifications:
            type: structure
            label: Certificaten
            fields:
              item:
                type: text
                label: Certificaat

  treatments:
    label: Behandelingen
    sections:
      treatments:
        type: fields
        fields:
          promoActive:
            type: toggle
            label: Actieprijs tonen
            text: Ja, toon de actieprijs op de behandelkaarten
          promoText:
            type: textarea
            label: Promotekst (optioneel — wordt getoond boven de behandelingen)
          treatments:
            type: structure
            label: Behandelingen
            fields:
              name:
                type: text
                label: Naam
              image:
                type: files
                label: Afbeelding
                max: 1
                query: page.files
              description:
                type: writer
                label: Omschrijving
                marks:
                  - bold
                  - italic
              durations:
                type: textarea
                label: "Duur & prijs (één per regel: duur | prijs, bijv: 60 min | €70)"
              promoDurations:
                type: textarea
                label: "Actieprijs (zelfde formaat, optioneel — wordt getoond als aanbieding actief is)"
              ctaLabel:
                type: text
                label: Knoptekst
                placeholder: Maak een afspraak
              note:
                type: text
                label: Opmerking (optioneel)
              forMenToo:
                type: toggle
                label: Ook voor mannen
                text: Ja

  practical:
    label: Praktisch
    sections:
      practical:
        type: fields
        fields:
          practicalHeading:
            type: text
            label: Koptekst
          practicalItems:
            type: structure
            label: Praktische informatie
            fields:
              item:
                type: text
                label: Item
          practicalNote:
            type: textarea
            label: Toegankelijkheidsnotitie
